image: python:3.12-slim

stages: [lint, test]

before_script:
  - pip install uv
  - uv sync --all-extras

lint:
  stage: lint
  script:
    - uv run ruff check vss/ tests/
    - uv run ruff format --check vss/ tests/

test:
  stage: test
  script:
    - uv run pytest -q
  variables:
    LLM_PROVIDER: stub
